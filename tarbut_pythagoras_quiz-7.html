<style>
  :root {
    --purple: #7C3AED;
    --purple-light: #EDE9FE;
    --purple-dark: #4C1D95;
    --pink: #EC4899;
    --teal: #0EA5E9;
    --green: #10B981;
    --orange: #F59E0B;
    --red: #EF4444;
    --bg: #F5F3FF;
    --white: #ffffff;
    --dark: #1E1B4B;
    --gray: #6B7280;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Rubik', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    direction: rtl;
    overflow-x: hidden;
  }

  /* ── SCREENS ── */
  .screen { display: none; min-height: 100vh; flex-direction: column; }
  .screen.active { display: flex; }

  /* ══ WELCOME SCREEN ══ */
  #screen-welcome {
    background: linear-gradient(160deg, #4C1D95 0%, #7C3AED 50%, #A855F7 100%);
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    position: relative;
    overflow: hidden;
  }
  #screen-welcome::before {
    content: '';
    position: absolute;
    width: 300px; height: 300px;
    background: rgba(255,255,255,0.05);
    border-radius: 50%;
    top: -80px; left: -80px;
  }
  #screen-welcome::after {
    content: '';
    position: absolute;
    width: 200px; height: 200px;
    background: rgba(255,255,255,0.06);
    border-radius: 50%;
    bottom: -60px; right: -40px;
  }
  .welcome-icon {
    font-size: 80px;
    margin-bottom: 20px;
    animation: bounce 2s infinite;
    position: relative; z-index:1;
  }
  @keyframes bounce {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }
  .welcome-title {
    font-size: 30px;
    font-weight: 900;
    color: white;
    text-align: center;
    line-height: 1.2;
    margin-bottom: 10px;
    position: relative; z-index:1;
  }
  .welcome-subtitle {
    font-size: 18px;
    color: rgba(255,255,255,0.8);
    text-align: center;
    margin-bottom: 8px;
    position: relative; z-index:1;
  }
  .welcome-badge {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 20px;
    padding: 6px 18px;
    color: white;
    font-size: 15px;
    margin-bottom: 40px;
    position: relative; z-index:1;
  }
  .formula-card {
    background: white;
    border-radius: 20px;
    padding: 24px;

    text: "ריבועים בנויים על כל צלע. אם שטחי הריבועים על הניצבים הם 9 ו-16 — מהו שטח הריבוע על היתר?",
    sub: "",
    options: ["א. 7", "ב. 25", "ג. 144", "ד. 12"],
    answer: 1,
    explain: "✅ נכון! שטח הריבוע על היתר = 9 + 16 = 25",
    wrongExplain: "❌ לפי פיתגורס: שטח על היתר = 9 + 16 = 25",
    visual: "squares"
  },
  {
    text: "האם משולש שצלעותיו 6, 8, 10 הוא ישר-זווית?",
    sub: "בדקי: 6² + 8² = ? ומה זה 10²",
    options: ["א. כן, כי 36 + 64 = 100 ✓", "ב. לא, כי 6 + 8 ≠ 10", "ג. כן, כי 6 + 8 > 10", "ד. לא ניתן לדעת"],
    answer: 0,
    explain: "✅ נכון! 6² + 8² = 36 + 64 = 100 = 10² ✓ זהו משולש ישר-זווית (הכפלה של 3-4-5)!",
    wrongExplain: "❌ 6² + 8² = 36 + 64 = 100 = 10² — כן, זהו משולש ישר-זווית!",
    visual: "check",
    va: "6", vb: "8", vc: "10"
  }
];

const colors = ["#7C3AED","#EC4899","#10B981","#F59E0B","#0EA5E9","#7C3AED","#EC4899","#10B981","#F59E0B","#0EA5E9"];

let current = 0, score = 0, answered = false;

function buildVisual(q) {
  const card = document.getElementById("visual-card");
  const type = q.visual;

  if (type === "triangle") {
    // Draw proportional triangle based on actual leg values
    // Parse numeric values (strip non-numeric for scaling)
    const rawA = parseFloat(q.va) || 3;
    const rawB = parseFloat(q.vb) || 4;
    // scale so max leg = 110px, min = 55px
    const maxRaw = Math.max(rawA, rawB);
    const scale = 110 / maxRaw;
    const legA = Math.max(rawA * scale, 55); // horizontal leg (bottom)
    const legB = Math.max(rawB * scale, 55); // vertical leg (left)
    const ox = 25, oy = 20;
    const bx = ox + legA, by = oy + legB; // bottom-right corner (right angle)
    // Points: right-angle at bottom-left (ox, by), goes right to (bx,by), goes up to (ox,oy)
    const svgW = bx + 30, svgH = by + 25;
    const midAx = (ox + bx) / 2, midAy = by + 17; // label for leg a (bottom)
    const midBx = ox - 14,       midBy = (oy + by) / 2; // label for leg b (left side)
    // hypotenuse midpoint
    const midHx = (bx + ox) / 2 + 14, midHy = (oy + by) / 2 - 5;
    card.innerHTML = `
      <svg width="${svgW}" height="${svgH}" viewBox="0 0 ${svgW} ${svgH}" style="max-width:100%">
        <polygon points="${ox},${by} ${bx},${by} ${ox},${oy}" fill="#EDE9FE"/>
        <line x1="${ox}" y1="${by}" x2="${bx}" y2="${by}" stroke="#0EA5E9" stroke-width="3" stroke-linecap="round"/>
        <line x1="${ox}" y1="${by}" x2="${ox}" y2="${oy}" stroke="#F59E0B" stroke-width="3" stroke-linecap="round"/>
        <line x1="${bx}" y1="${by}" x2="${ox}" y2="${oy}" stroke="#EC4899" stroke-width="3" stroke-linecap="round"/>
        <polyline points="${ox},${by-14} ${ox+14},${by-14} ${ox+14},${by}" fill="none" stroke="#1E1B4B" stroke-width="2"/>
        <text x="${midAx}" y="${midAy}" text-anchor="middle" font-family="Rubik" font-size="15" font-weight="700" fill="#0EA5E9">${q.va||'a'}</text>
        <text x="${midBx}" y="${midBy+5}" text-anchor="middle" font-family="Rubik" font-size="15" font-weight="700" fill="#F59E0B">${q.vb||'b'}</text>
        <text x="${midHx}" y="${midHy}" text-anchor="start" font-family="Rubik" font-size="15" font-weight="700" fill="#EC4899">${q.vc||'c'}</text>
      </svg>`;
  } else if (type === "formula") {
    card.innerHTML = `
      <svg width="200" height="130" viewBox="0 0 200 130">
        <polygon points="20,115 180,115 20,15" fill="#EDE9FE"/>
        <line x1="20" y1="115" x2="180" y2="115" stroke="#0EA5E9" stroke-width="3" stroke-linecap="round"/>
        <line x1="20" y1="115" x2="20" y2="15" stroke="#F59E0B" stroke-width="3" stroke-linecap="round"/>
        <line x1="180" y1="115" x2="20" y2="15" stroke="#EC4899" stroke-width="3" stroke-linecap="round"/>
        <polyline points="20,100 35,100 35,115" fill="none" stroke="#1E1B4B" stroke-width="2"/>
        <text x="100" y="129" text-anchor="middle" font-family="Rubik" font-size="14" font-weight="700" fill="#0EA5E9">a</text>
        <text x="8" y="68" text-anchor="middle" font-family="Rubik" font-size="14" font-weight="700" fill="#F59E0B">b</text>
        <text x="118" y="58" text-anchor="middle" font-family="Rubik" font-size="14" font-weight="700" fill="#EC4899">c (יתר)</text>
      </svg>
      <div style="font-size:14px;color:#6B7280;margin-top:4px">מהי הנוסחה הנכונה?</div>`;
  } else if (type === "check") {
    card.innerHTML = `
      <svg width="200" height="130" viewBox="0 0 200 130">
        <polygon points="20,115 180,115 20,15" fill="#EDE9FE"/>
        <line x1="20" y1="115" x2="180" y2="115" stroke="#0EA5E9" stroke-width="3" stroke-linecap="round"/>
        <line x1="20" y1="115" x2="20" y2="15" stroke="#F59E0B" stroke-width="3" stroke-linecap="round"/>
        <line x1="180" y1="115" x2="20" y2="15" stroke="#EC4899" stroke-width="3" stroke-linecap="round"/>
        <text x="100" y="130" text-anchor="middle" font-family="Rubik" font-size="14" font-weight="700" fill="#0EA5E9">${q.va}</text>
        <text x="7" y="68" text-anchor="middle" font-family="Rubik" font-size="14" font-weight="700" fill="#F59E0B">${q.vb}</text>
        <text x="115" y="58" text-anchor="middle" font-family="Rubik" font-size="14" font-weight="700" fill="#EC4899">${q.vc}</text>
        <text x="100" y="75" text-anchor="middle" font-family="Rubik" font-size="13" font-weight="700" fill="#7C3AED">ישר-זווית?</text>
      </svg>`;
  } else if (type === "ladder") {
    card.innerHTML = `
      <svg width="180" height="150" viewBox="0 0 180 150">
        <!-- ground -->
        <line x1="10" y1="135" x2="170" y2="135" stroke="#9CA3AF" stroke-width="3"/>
        <!-- wall -->
        <line x1="30" y1="10" x2="30" y2="135" stroke="#6B7280" stroke-width="8" stroke-linecap="round"/>
        <!-- ladder -->
        <line x1="110" y1="135" x2="30" y2="35" stroke="#7C3AED" stroke-width="4" stroke-linecap="round"/>
        <!-- right angle -->
        <polyline points="30,120 45,120 45,135" fill="none" stroke="#1E1B4B" stroke-width="2"/>
        <!-- labels -->
        <text x="72" y="152" text-anchor="middle" font-family="Rubik" font-size="13" font-weight="700" fill="#0EA5E9">3 מ'</text>
        <text x="78" y="80" text-anchor="middle" font-family="Rubik" font-size="13" font-weight="700" fill="#7C3AED">5 מ'</text>
        <text x="16" y="90" text-anchor="middle" font-family="Rubik" font-size="13" font-weight="700" fill="#F59E0B">?</text>
      </svg>`;
  } else if (type === "label-triangle") {
    card.innerHTML = `
      <svg width="200" height="140" viewBox="0 0 200 140">
        <polygon points="20,125 180,125 20,15" fill="#EDE9FE"/>
        <line x1="20" y1="125" x2="180" y2="125" stroke="#0EA5E9" stroke-width="3"/>
        <line x1="20" y1="125" x2="20" y2="15" stroke="#F59E0B" stroke-width="3"/>
        <line x1="180" y1="125" x2="20" y2="15" stroke="#EC4899" stroke-width="3"/>
        <polyline points="20,110 35,110 35,125" fill="none" stroke="#1E1B4B" stroke-width="2"/>
        <text x="100" y="140" text-anchor="middle" font-family="Rubik" font-size="13" font-weight="700" fill="#0EA5E9">ניצב</text>
        <text x="7" y="73" text-anchor="middle" font-family="Rubik" font-size="13" font-weight="700" fill="#F59E0B">ניצב</text>
        <text x="130" y="62" text-anchor="middle" font-family="Rubik" font-size="13" font-weight="700" fill="#EC4899">???</text>
      </svg>`;
  } else if (type === "squares") {
    card.innerHTML = `
      <svg width="200" height="150" viewBox="0 0 200 150">
        <!-- triangle -->
        <polygon points="80,120 150,120 80,50" fill="#EDE9FE"/>
        <line x1="80" y1="120" x2="150" y2="120" stroke="#0EA5E9" stroke-width="2.5"/>
        <line x1="80" y1="120" x2="80" y2="50" stroke="#F59E0B" stroke-width="2.5"/>
        <line x1="150" y1="120" x2="80" y2="50" stroke="#EC4899" stroke-width="2.5"/>
        <polyline points="80,107 93,107 93,120" fill="none" stroke="#1E1B4B" stroke-width="2"/>
        <!-- square on bottom leg a -->
        <rect x="80" y="120" width="70" height="25" fill="rgba(14,165,233,0.15)" stroke="#0EA5E9" stroke-width="1.5"/>
        <text x="115" y="137" text-anchor="middle" font-family="Rubik" font-size="12" font-weight="700" fill="#0EA5E9">9</text>
        <!-- square on left leg b -->
        <rect x="45" y="50" width="35" height="70" fill="rgba(245,158,11,0.15)" stroke="#F59E0B" stroke-width="1.5"/>
        <text x="62" y="90" text-anchor="middle" font-family="Rubik" font-size="12" font-weight="700" fill="#F59E0B">16</text>
        <!-- square on hyp -->
        <text x="152" y="85" font-family="Rubik" font-size="13" font-weight="700" fill="#EC4899">= ?</text>
      </svg>`;
  } else {
    card.innerHTML = `<div style="font-size:48px">📐</div>`;
  }
}

function startQuiz() {
  document.getElementById("screen-welcome").classList.remove("active");
  document.getElementById("screen-quiz").classList.add("active");
  current = 0; score = 0;
  loadQuestion();
}

function loadQuestion() {
  answered = false;
  const q = questions[current];
  const col = colors[current];

  // header
  document.getElementById("q-counter").textContent = `שאלה ${current+1} מתוך ${questions.length}`;
  document.getElementById("score-display").textContent = `✅ ${score}`;
  document.getElementById("progress-bar").style.width = `${(current / questions.length) * 100}%`;

  // badge
  const badge = document.getElementById("q-num-badge");
  badge.textContent = current + 1;
  badge.style.background = col;

  // visual
  buildVisual(q);

  // question
  document.getElementById("q-text").textContent = q.text;
  document.getElementById("q-sub").textContent = q.sub || "";

  // options
  const grid = document.getElementById("options-grid");
  grid.innerHTML = "";
  const letters = ["א", "ב", "ג", "ד"];
  q.options.forEach((opt, i) => {
    const btn = document.createElement("button");
    btn.className = "option-btn";
    btn.innerHTML = `<span class="option-letter">${letters[i]}</span>${opt.substring(3)}`;
    btn.onclick = () => selectAnswer(i, q, col);
    grid.appendChild(btn);
  });

  // reset
  const fb = document.getElementById("feedback-box");
  fb.className = "feedback-box";
  fb.textContent = "";
  const nb = document.getElementById("next-btn");
  nb.classList.remove("visible");
  nb.textContent = current === questions.length - 1 ? "📊 ראי את התוצאות!" : "הבא ←";
}

function selectAnswer(idx, q, col) {
  if (answered) return;
  answered = true;

  const btns = document.querySelectorAll(".option-btn");
  const fb = document.getElementById("feedback-box");
  const correct = q.answer;

  btns.forEach((btn, i) => {
    btn.classList.add("disabled");
    if (i === correct && i !== idx) btn.classList.add("show-correct");
  });

  if (idx === correct) {
    btns[idx].classList.add("selected-correct");
    fb.className = "feedback-box correct";
    fb.textContent = q.explain;
    score++;
  } else {
    btns[idx].classList.add("selected-wrong");
    fb.className = "feedback-box wrong";
    fb.textContent = q.wrongExplain;
  }

  document.getElementById("score-display").textContent = `✅ ${score}`;
  document.getElementById("next-btn").classList.add("visible");
}

function nextQuestion() {
  current++;
  if (current >= questions.length) {
    showResult();
  } else {
    loadQuestion();
    window.scrollTo(0,0);
  }
}

function showResult() {
  document.getElementById("screen-quiz").classList.remove("active");
  document.getElementById("screen-result").classList.add("active");

  const pct = Math.round((score / questions.length) * 100);
  const wrong = questions.length - score;

  document.getElementById("final-score").textContent = pct;
  document.getElementById("res-correct").textContent = `${score} ✅`;
  document.getElementById("res-wrong").textContent = `${wrong} ❌`;

  let grade, stars, trophy, level;
  if (pct === 100)    { grade="מושלם! 🌟"; stars="⭐⭐⭐⭐⭐"; trophy="🏆"; level="מצטיינת"; }
  else if (pct >= 90) { grade="מעולה! 🎉"; stars="⭐⭐⭐⭐⭐"; trophy="🏆"; level="מצטיינת"; }
  else if (pct >= 70) { grade="כל הכבוד! 👏"; stars="⭐⭐⭐⭐"; trophy="🥇"; level="טובה מאוד"; }
  else if (pct >= 50) { grade="טוב, המשיכי! 💪"; stars="⭐⭐⭐"; trophy="🥈"; level="בינונית"; }
  else               { grade="יש להתאמן עוד 📚"; stars="⭐⭐"; trophy="🎯"; level="צריכה חיזוק"; }

  document.getElementById("grade-text").textContent = grade;
  document.getElementById("stars-row").textContent = stars;
  document.getElementById("trophy-icon").textContent = trophy;
  document.getElementById("res-level").textContent = level;

  const now = new Date();
  const dateStr = now.toLocaleDateString("he-IL");
  const shareText = `📐 תוצאות תרגול פיתגורס\n👩‍🎓 תאריך: ${dateStr}\n✅ תשובות נכונות: ${score}/10\n📊 ציון: ${pct}\n⭐ רמה: ${level}\n${grade}`;
  document.getElementById("share-text-box").textContent = shareText;

  if (pct >= 70) spawnConfetti();
}

function spawnConfetti() {
  const container = document.getElementById("confetti-bg");
  const confettiColors = ["#7C3AED","#EC4899","#10B981","#F59E0B","#0EA5E9","#EF4444","#F97316"];
  for (let i = 0; i < 40; i++) {
    const piece = document.createElement("div");
    piece.className = "confetti-piece";
    piece.style.cssText = `
      left: ${Math.random()*100}%;
      background: ${confettiColors[Math.floor(Math.random()*confettiColors.length)]};
      width: ${6+Math.random()*8}px;
      height: ${6+Math.random()*8}px;
      border-radius: ${Math.random()>0.5 ? '50%' : '2px'};
      animation-duration: ${2+Math.random()*3}s;
      animation-delay: ${Math.random()*2}s;
    `;
    container.appendChild(piece);
  }
}

function shareResult() {
  const text = document.getElementById("share-text-box").textContent;
  // Try native share (mobile)
  if (navigator.share) {
    navigator.share({ title: "תוצאות תרגול פיתגורס", text: text }).catch(() => openWhatsApp(text));
  } else {
    openWhatsApp(text);
  }
}

function openWhatsApp(text) {
  const encoded = encodeURIComponent(text);
  // Opens WhatsApp with pre-filled message (works on mobile and desktop)
  const waUrl = `https://wa.me/?text=${encoded}`;
  window.open(waUrl, '_blank');
}

function copyText() {
  const text = document.getElementById("share-text-box").textContent;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById("copy-btn");
      btn.textContent = "✅ הועתק!";
      setTimeout(() => { btn.textContent = "📋 העתק טקסט"; }, 2000);
    }).catch(() => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  const ta = document.createElement("textarea");
  ta.value = text;
  ta.style.position = "fixed";
  ta.style.opacity = "0";
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  document.execCommand("copy");
  document.body.removeChild(ta);
  const btn = document.getElementById("copy-btn");
  btn.textContent = "✅ הועתק!";
  setTimeout(() => { btn.textContent = "📋 העתק טקסט"; }, 2000);
}

function retryQuiz() {
  document.getElementById("screen-result").classList.remove("active");
  document.getElementById("confetti-bg").innerHTML = "";
  startQuiz();
}
</script>
